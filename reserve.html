<main>
    <div class="form card">
        <h2>Reserve Your Spot Now</h2>
        <p class="subtitle">Fill Your details below and we'll confirm your spot.</p>
        <label for="name">Full name</label>
<input type="text" id="name" name="Name" required>

<label for="email">Email</label>
<input type="email" id="email" name="Email" required>

<label for="phone">Phone number</label>
<input type="tel" id="phone" name="Phone">

<label for="event">Event</label>
<select id="event" name="Event">
  <option>Tasting Flight</option>
  <option>Craft your own bowls with cute little animals</option>
  <option>Learning to pick the fruits the fresh way!</option>
</select>

<label for="guests">Number of guests</label>
<input type="number" id="guests" name="Guests" min="1" value="1">

<label for="notes">Notes</label>
<textarea id="notes" name="Notes" placeholder="Any special requests"></textarea>

<a href="thankyu.html" class="reserve-btn">Reserve</a>
